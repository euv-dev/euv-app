<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>euv</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #fff; z-index: 9999;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #e0e0e0;
      border-top-color: #333; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { margin-top: 16px; font-size: 14px; color: #999; font-family: system-ui, sans-serif; }
    #retry-btn {
      display: none; margin-top: 20px; padding: 10px 32px;
      background: #333; color: #fff; border: none; border-radius: 6px;
      font-size: 14px; cursor: pointer; font-family: system-ui, sans-serif;
    }
    #retry-btn.visible { display: inline-block; }
    #frame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    #frame.visible { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner" id="spinner"></div>
    <div id="loading-text">加载中...</div>
    <button id="retry-btn">点击重试</button>
  </div>
  <iframe id="frame"></iframe>

  <script>
    (function() {
      var REMOTE_URL = 'https://ltpp.vip/euv';
      var loadingEl = document.getElementById('loading');
      var spinnerEl = document.getElementById('spinner');
      var loadingTextEl = document.getElementById('loading-text');
      var retryBtn = document.getElementById('retry-btn');
      var frame = document.getElementById('frame');
      var loadTimer = null;
      var finished = false;
      var loadAttempts = 0;

      function showLoading(text, withRetry) {
        loadingEl.classList.remove('hidden');
        frame.classList.remove('visible');
        loadingTextEl.textContent = text || '加载中...';
        spinnerEl.style.display = withRetry ? 'none' : 'block';
        retryBtn.classList.toggle('visible', !!withRetry);
      }

      function showContent() {
        loadingEl.classList.add('hidden');
        frame.classList.add('visible');
      }

      function startLoadTimer(seconds) {
        clearTimeout(loadTimer);
        loadTimer = setTimeout(function() {
          if (!finished) {
            finished = true;
            clearTimeout(loadTimer);
            console.warn('[euv] Load timed out after ' + seconds + 's');
            showLoading('加载超时 (尝试 ' + loadAttempts + ' 次)，请检查网络', true);
          }
        }, seconds * 1000);
      }

      function doLoad() {
        finished = false;
        loadAttempts++;
        clearTimeout(loadTimer);
        startLoadTimer(20);
        showLoading('加载中... (尝试 ' + loadAttempts + ')', false);

        // Remove old iframe and create fresh one
        var oldFrame = frame;
        var newFrame = document.createElement('iframe');
        newFrame.id = 'frame';
        newFrame.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;display:none;';
        newFrame.setAttribute('allowfullscreen', '');

        newFrame.onload = function() {
          if (finished) return;
          finished = true;
          clearTimeout(loadTimer);
          console.log('[euv] iframe loaded successfully on attempt ' + loadAttempts);
          frame = newFrame;
          showContent();
        };

        newFrame.onerror = function(e) {
          console.error('[euv] iframe error:', e);
        };

        // Replace in DOM
        oldFrame.parentNode.replaceChild(newFrame, oldFrame);

        // Set src to trigger load
        console.log('[euv] Setting iframe src to: ' + REMOTE_URL);
        newFrame.src = REMOTE_URL;
      }

      retryBtn.addEventListener('click', function() {
        console.log('[euv] Retry clicked');
        doLoad();
      });

      // Start loading when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', doLoad);
      } else {
        doLoad();
      }
    })();
  </script>
</body>
</html>
